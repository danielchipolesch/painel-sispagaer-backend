# =============================================================================
# PAINEL SISPAGAER - BACKEND
# Configuração da aplicação Quarkus
# Variáveis sensíveis devem ser injetadas via Secrets do Kubernetes,
# nunca comitadas em texto plano.
# =============================================================================

# --- Aplicação ---
quarkus.application.name=painel-sispagaer-backend
quarkus.application.version=1.0.0

# --- HTTP ---
quarkus.http.port=8080

# --- CORS ---
# Permite apenas a origem do frontend. Em produção, substituir pela URL real.
# Múltiplas origens separadas por vírgula: https://a.fab.mil.br,https://b.fab.mil.br
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
quarkus.http.cors.methods=GET,OPTIONS
quarkus.http.cors.headers=Accept,Content-Type,X-API-Key
quarkus.http.cors.exposed-headers=Content-Disposition
quarkus.http.cors.access-control-max-age=86400

# --- Data Warehouse (MySQL Reativo) ---
# A URL de conexão e credenciais devem vir de Secrets do Kubernetes.
# Para SQL Server: db-kind=mssql, url=sqlserver://host:1433/dw_sispagaer
quarkus.datasource.db-kind=mysql
quarkus.datasource.reactive.url=${DB_URL:mysql://localhost:3306/dw_sispagaer}
quarkus.datasource.username=${DB_USERNAME:sispagaer}
quarkus.datasource.password=${DB_PASSWORD:changeme}

# Pool reativo: suporta alta concorrência sem bloquear threads
quarkus.datasource.reactive.max-size=30
quarkus.datasource.reactive.idle-timeout=PT10M
quarkus.datasource.reactive.connection-timeout=PT5S

# SSL na conexão com o banco (recomendado em produção).
# Para desabilitar SSL em ambiente dev interno, defina DB_SSL=false.
quarkus.datasource.reactive.ssl=false

# Dev Services: se DB_URL não for fornecida em modo dev, o Quarkus
# sobe automaticamente um contêiner MySQL via Testcontainers.
# Requer Docker rodando na máquina. Não interfere em produção.
%dev.quarkus.datasource.devservices.image-name=mysql:8.4
%dev.quarkus.datasource.devservices.db-name=dw_sispagaer

# --- Cache (Caffeine em memória) ---
# Dimensões mudam raramente: TTL longo
quarkus.cache.caffeine."dimensoes".expire-after-write=PT2H
quarkus.cache.caffeine."dimensoes".maximum-size=500

# Totais por período: TTL médio (dados atualizados a cada carga do DW)
quarkus.cache.caffeine."totais".expire-after-write=PT30M
quarkus.cache.caffeine."totais".maximum-size=200

# Série histórica: TTL longo (dados históricos não mudam)
quarkus.cache.caffeine."serie-historica".expire-after-write=PT1H
quarkus.cache.caffeine."serie-historica".maximum-size=100

# Dashboard resumo: TTL curto (consulta agregada, mais pesada)
quarkus.cache.caffeine."dashboard".expire-after-write=PT15M
quarkus.cache.caffeine."dashboard".maximum-size=50

# --- OpenAPI / Swagger ---
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
quarkus.smallrye-openapi.path=/openapi

# --- Health Checks (Kubernetes) ---
quarkus.smallrye-health.root-path=/q/health

# --- Métricas (Prometheus) ---
quarkus.micrometer.export.prometheus.path=/q/metrics

# --- Segurança: API Key ---
# Em produção, injetar via Secret do Kubernetes. NUNCA commitar o valor real.
sispagaer.security.api-key=${API_KEY:dev-only-key-troque-em-producao}
sispagaer.security.api-key-header=X-API-Key

# Caminhos que não exigem autenticação (health, métricas, openapi)
sispagaer.security.public-paths=/q/health,/q/metrics,/openapi,/swagger-ui

# --- Logging ---
quarkus.log.level=INFO
quarkus.log.category."br.mil.fab.sispagaer".level=DEBUG
# Em produção, habilitar JSON para integração com ELK/Loki:
# quarkus.log.console.json=true

# --- Kubernetes ---
quarkus.kubernetes.namespace=sispagaer
quarkus.kubernetes.replicas=2
quarkus.kubernetes.resources.requests.memory=256Mi
quarkus.kubernetes.resources.requests.cpu=250m
quarkus.kubernetes.resources.limits.memory=512Mi
quarkus.kubernetes.resources.limits.cpu=500m

# Liveness / Readiness probes
quarkus.kubernetes.liveness-probe.http-action-path=/q/health/live
quarkus.kubernetes.readiness-probe.http-action-path=/q/health/ready
quarkus.kubernetes.liveness-probe.initial-delay=10s
quarkus.kubernetes.readiness-probe.initial-delay=5s

# --- Container Image ---
quarkus.container-image.registry=${CONTAINER_REGISTRY:registry.fab.mil.br}
quarkus.container-image.group=sispagaer
quarkus.container-image.name=painel-backend

# =============================================================================
# PERFIL: dev (quarkus:dev)
# =============================================================================
%dev.quarkus.log.level=DEBUG
%dev.quarkus.swagger-ui.always-include=true
%dev.quarkus.http.cors.origins=http://localhost:3000,http://localhost:5173

# =============================================================================
# PERFIL: test
# =============================================================================
%test.quarkus.log.level=WARN
%test.sispagaer.security.api-key=test-api-key-123
